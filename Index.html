<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Press — Morning Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1209;
  --ink-faded:  #4a3f30;
  --ink-light:  #8a7d6e;
  --paper:      #f5f0e8;
  --paper-warm: #ede7d9;
  --paper-dark: #ddd6ca;
  --rule:       #c8bfb0;
  --accent:     #8b1a1a;
  --green:      #2a5e2a;
  --blue:       #3a5fa0;
  --amber:      #b06a00;
}

html { font-size: 16px; }
body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; }

/* ── MASTHEAD ── */
.masthead {
  border-bottom: 3px double var(--ink);
  padding: 1.75rem 3rem 1.1rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
}
.masthead-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 900; letter-spacing: -0.02em; line-height: 1;
}
.masthead-title span { color: var(--accent); }
.masthead-meta {
  text-align: right; font-family: 'DM Mono', monospace;
  font-size: 0.7rem; color: var(--ink-light); line-height: 1.9;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.masthead-rule { border: none; border-top: 1px solid var(--ink); margin: 0 3rem; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 1rem 3rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule); flex-wrap: wrap; gap: 0.8rem;
}
.btn-refresh {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--ink); color: var(--paper); border: none;
  padding: 0.55rem 1.4rem; cursor: pointer; transition: background 0.15s;
}
.btn-refresh:hover    { background: var(--accent); }
.btn-refresh:disabled { background: var(--ink-light); cursor: not-allowed; }
#status { font-family: 'DM Mono', monospace; font-size: 0.67rem; color: var(--ink-light); letter-spacing: 0.04em; }
#status.loading { color: var(--accent); }
#status.done    { color: var(--green); }
#status.error   { color: var(--accent); }

.filter-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill {
  font-family: 'DM Mono', monospace; font-size: 0.63rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid var(--rule); padding: 0.25rem 0.7rem;
  cursor: pointer; background: transparent; color: var(--ink-faded); transition: all 0.12s;
}
.pill:hover, .pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── PROGRESS ── */
.progress { height: 2px; background: var(--rule); }
.progress-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.35s ease; }

/* ── GRID ── */
.grid {
  padding: 2.5rem 3rem;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  max-width: 1600px;
  margin: 0 auto;
}
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 680px)  { .grid { grid-template-columns: 1fr; } }

/* ── CARD ── */
.card {
  border: 1px solid var(--rule);
  margin: -1px 0 0 -1px;
  padding: 2rem;
  background: var(--paper);
  display: flex; flex-direction: column;
  min-height: 420px;
  transition: background 0.15s;
}
.card:hover { background: #f9f5ee; }
.card.hidden { display: none; }

.card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 0.75rem; margin-bottom: 1.3rem; gap: 0.75rem;
}
.card-head-left { display: flex; flex-direction: column; gap: 0.3rem; }
.paper-name { font-family: 'Playfair Display', Georgia, serif; font-size: 1.1rem; font-weight: 700; line-height: 1.2; color: var(--ink); }
.source-label { font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); }
.source-label.most-read  { color: var(--green); }
.source-label.front-page { color: var(--ink-light); }

.badge { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.14rem 0.45rem; border: 1px solid; flex-shrink: 0; align-self: flex-start; }
.badge.us { color: var(--blue);   border-color: var(--blue); }
.badge.uk { color: var(--accent); border-color: var(--accent); }
.badge.eu { color: var(--green);  border-color: var(--green); }
.badge.nl { color: var(--amber);  border-color: var(--amber); }

/* ── ARTICLES ── */
.articles { display: flex; flex-direction: column; gap: 1.2rem; flex: 1; }
.art { border-bottom: 1px solid var(--paper-dark); padding-bottom: 1.2rem; }
.art:last-child { border-bottom: none; padding-bottom: 0; }

.art-rank { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--ink-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.3rem; }
.art-hl {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.05rem; font-weight: 700; line-height: 1.38;
  color: var(--ink); text-decoration: none; display: block; margin-bottom: 0.4rem;
}
.art-hl:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.art-sum { font-size: 0.84rem; line-height: 1.6; color: var(--ink-faded); font-weight: 300; margin-bottom: 0.4rem; }
.art-meta { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--ink-light); display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
.art-meta a { color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 0.06em; }
.art-meta a:hover { text-decoration: underline; }
.translated-note { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--ink-light); font-style: italic; opacity: 0.8; }

/* ── SKELETON ── */
.skel-wrap { display: flex; flex-direction: column; gap: 0.55rem; }
.sk {
  border-radius: 2px;
  background: linear-gradient(90deg, var(--paper-dark) 25%, var(--paper-warm) 50%, var(--paper-dark) 75%);
  background-size: 200% 100%;
  animation: shi 1.4s infinite;
}
@keyframes shi { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* ── ERROR STATE ── */
.card-err { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--ink-light); line-height: 1.9; padding: 0.5rem 0; flex: 1; }
.card-err a  { color: var(--accent); text-decoration: underline; }
.card-err em { font-size: 0.58rem; opacity: 0.7; display: block; margin-top: 0.3rem; font-style: normal; }

/* ── FOOTER ── */
footer { border-top: 1px solid var(--rule); padding: 1.1rem 3rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
.fn { font-family: 'DM Mono', monospace; font-size: 0.61rem; color: var(--ink-light); letter-spacing: 0.03em; line-height: 1.7; }
.legend { display: flex; gap: 1rem; align-items: center; }
.legend-item { display: flex; gap: 0.35rem; align-items: center; font-size: 0.58rem; font-family: 'DM Mono', monospace; color: var(--ink-light); letter-spacing: 0.05em; }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot.mr { background: var(--green); }
.dot.fp { background: var(--ink-light); }

@media (max-width: 680px) {
  .masthead, .masthead-rule, .toolbar, .grid, footer { padding-left: 1.2rem; padding-right: 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="masthead-title">Quality <span>Press</span></div>
    <div class="masthead-meta">
      <div id="js-date"></div>
      <div>Morning Digest</div>
    </div>
  </div>
  <hr class="masthead-rule">
</header>

<div class="toolbar">
  <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap">
    <button class="btn-refresh" id="btn" onclick="loadAll()">↺ Refresh Headlines</button>
    <span id="status">Loading…</span>
  </div>
  <div style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap">
    <div class="legend">
      <div class="legend-item"><div class="dot mr"></div>Meest gelezen</div>
      <div class="legend-item"><div class="dot fp"></div>Voorpagina</div>
    </div>
    <div class="filter-group">
      <button class="pill active" onclick="applyFilter('all',this)">All</button>
      <button class="pill" onclick="applyFilter('us',this)">US</button>
      <button class="pill" onclick="applyFilter('uk',this)">UK</button>
      <button class="pill" onclick="applyFilter('eu',this)">EU</button>
      <button class="pill" onclick="applyFilter('nl',this)">NL</button>
    </div>
  </div>
</div>

<div class="progress"><div class="progress-fill" id="prog"></div></div>
<main class="grid" id="grid"></main>
<footer>
  <div class="fn">Quality Press · RSS, Guardian Open Platform &amp; smart scraping · Links openen originele artikelen</div>
  <div class="fn" id="updated"></div>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════════════
// NEWSPAPER LIST  —  EU/FR and EU/DE go last (also get translated)
// ═══════════════════════════════════════════════════════════════════════
const PAPERS = [
  {
    id:'nyt',  name:'The New York Times',    region:'us',
    home:'https://www.nytimes.com',
    type:'rss', rss:'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml',
    sourceLabel:'Voorpagina',
  },
  {
    id:'wapo', name:'Washington Post',       region:'us',
    home:'https://www.washingtonpost.com',
    type:'rss',
    // Try official WaPo RSS feeds first; Google News is a reliable fallback
    rssUrls:[
      'https://feeds.washingtonpost.com/rss/world',
      'https://feeds.washingtonpost.com/rss/national',
      'https://feeds.washingtonpost.com/rss/politics',
      'https://news.google.com/rss/search?q=site:washingtonpost.com&hl=en&gl=US&ceid=US:en',
    ],
    sourceLabel:'Voorpagina',
  },
  {
    id:'wsj',  name:'Wall Street Journal',  region:'us',
    home:'https://www.wsj.com',
    type:'rss',
    // Google News RSS first — always current. DJ feeds can be weeks stale.
    rssUrls:[
      'https://news.google.com/rss/search?q=site:wsj.com&hl=en&gl=US&ceid=US:en',
      'https://feeds.a.dj.com/rss/RSSWorldNews.xml',
      'https://feeds.a.dj.com/rss/WSJcomUSBusiness.xml',
    ],
    sourceLabel:'Voorpagina',
  },
  {
    id:'ft',   name:'Financial Times',      region:'uk',
    home:'https://www.ft.com',
    type:'html-scrape',
    scrapeUrl:'https://www.ft.com',
    articleTest: h => h.includes('ft.com/content/') || (h.startsWith('/content/') && h.length > 20),
    sourceLabel:'Voorpagina',
  },
  {
    id:'guard',name:'The Guardian',         region:'uk',
    home:'https://www.theguardian.com',
    type:'guardian',
    sourceLabel:'Meest gelezen',
  },
  {
    id:'nrc',  name:'NRC',                  region:'nl',
    home:'https://www.nrc.nl',
    // NRC exposes a dedicated most-read fragment endpoint (SSR, no JS needed)
    type:'nrc',
    rss:'https://www.nrc.nl/rss/',
    domain:'https://www.nrc.nl',
    sourceLabel:'Meest gelezen',
  },
  {
    id:'vk',   name:'de Volkskrant',        region:'nl',
    home:'https://www.volkskrant.nl',
    // VK has a dedicated /best-gelezen/ page (SSR). Uses DPG CMS (not Next.js).
    type:'volkskrant',
    rss:'https://www.volkskrant.nl/rss.xml',
    domain:'https://www.volkskrant.nl',
    sourceLabel:'Best gelezen',
  },
  // ── EU papers last — headlines translated FR/DE → EN via MyMemory ──
  {
    id:'monde',name:'Le Monde',             region:'eu',
    home:'https://www.lemonde.fr',
    type:'html-most-read',
    scrapeUrl:'https://www.lemonde.fr',
    mrKeywords:['les plus lus','plus lus','les plus populaires','populaires'],
    articleTest: h => h.includes('lemonde.fr/'),
    rss:'https://www.lemonde.fr/rss/une.xml',
    domain:'https://www.lemonde.fr',
    lang:'fr',
    sourceLabel:'Plus lus → EN',
  },
  {
    id:'faz',  name:'Frankfurter Allgemeine',region:'eu',
    home:'https://www.faz.net',
    type:'html-most-read',
    scrapeUrl:'https://www.faz.net',
    mrKeywords:['meistgelesen','meist gelesen','meistgeklickt','beliebt'],
    articleTest: h => h.includes('faz.net/'),
    rss:'https://www.faz.net/rss/aktuell/',
    domain:'https://www.faz.net',
    lang:'de',
    sourceLabel:'Meistgelesen → EN',
  },
];

// ═══════════════════════════════════════════════════════════════════════
// CORS PROXIES
// ═══════════════════════════════════════════════════════════════════════
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

async function doFetch(url, ms = 14000) {
  const ctrl = new AbortController();
  const t    = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.text();
  } catch(e) { clearTimeout(t); throw e; }
}

async function fetchViaProxies(targetUrl) {
  const errs = [];
  for (const mkP of PROXIES) {
    try {
      console.log('[QP] →', mkP(targetUrl).slice(0, 90) + '…');
      return await doFetch(mkP(targetUrl));
    } catch(e) { errs.push(e.message); }
  }
  throw new Error('All proxies failed: ' + errs.join(' | '));
}

// ═══════════════════════════════════════════════════════════════════════
// TRANSLATION  —  MyMemory free API, no key needed (5 000 chars/day)
// ═══════════════════════════════════════════════════════════════════════
async function translateText(text, fromLang) {
  if (!text || !fromLang || fromLang === 'en') return text;
  try {
    const q   = encodeURIComponent(text.slice(0, 450));
    const url = `https://api.mymemory.translated.net/get?q=${q}&langpair=${fromLang}|en`;
    const res = await doFetch(url, 7000);
    const d   = JSON.parse(res);
    if (d.responseStatus === 200 && d.responseData?.translatedText)
      return d.responseData.translatedText;
  } catch(e) { console.warn('[QP] translate failed:', e.message); }
  return text;
}

async function translateArticles(articles, fromLang) {
  if (!fromLang || fromLang === 'en') return articles;
  return Promise.all(articles.map(async a => {
    const [tHead, tSum] = await Promise.all([
      translateText(a.headline, fromLang),
      a.summary ? translateText(a.summary, fromLang) : Promise.resolve(''),
    ]);
    return { ...a, headline: tHead, summary: tSum, translated: true };
  }));
}

// ═══════════════════════════════════════════════════════════════════════
// RSS PARSER
// ═══════════════════════════════════════════════════════════════════════
function getTag(el, ...names) {
  for (const n of names) {
    const f = el.getElementsByTagName(n)[0];
    if (f) return f.textContent.trim();
  }
  return '';
}
function getLink(item) {
  for (const el of item.getElementsByTagName('link')) {
    const t = el.textContent.trim();
    if (t.startsWith('http')) return t;
    const h = el.getAttribute('href');
    if (h?.startsWith('http')) return h;
  }
  const g = getTag(item, 'guid');
  return g.startsWith('http') ? g : '';
}
function parseRSSXML(xml) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('RSS XML parse error');
  const items = [...doc.querySelectorAll('item, entry')];
  if (!items.length) throw new Error('No items in RSS');
  return items.slice(0, 5).map(item => {
    const rawDate = getTag(item, 'pubDate','published','updated','date');
    return {
      headline: stripHtml(getTag(item, 'title')),
      url:      getLink(item),
      summary:  stripHtml(getTag(item, 'description','summary','content:encoded','encoded','content')).slice(0, 240),
      time:     relTime(rawDate),
      rawDate,  // kept for freshness check; not displayed
    };
  }).filter(a => a.headline && a.url);
}

// ═══════════════════════════════════════════════════════════════════════
// GUARDIAN  —  tries multiple strategies for cross-site most-viewed
// ═══════════════════════════════════════════════════════════════════════
function mapGuardianResult(r) {
  return {
    headline: r.fields?.headline || r.webTitle || '',
    summary:  stripHtml(r.fields?.trailText || '').slice(0, 240),
    url:      r.webUrl || '',
    time:     relTime(r.webPublicationDate),
  };
}

async function fetchGuardian() {
  // Strategy 1: root section with show-most-viewed=true (cross-site)
  try {
    const t = await doFetch(
      'https://content.guardianapis.com/?api-key=test&show-most-viewed=true&show-fields=trailText,headline&page-size=10',
      12000
    );
    const d = JSON.parse(t);
    const mv = d.response?.mostViewed?.results;
    if (mv?.length) {
      console.log('[QP] Guardian: root mostViewed →', mv.length);
      return { articles: mv.slice(0,3).map(mapGuardianResult).filter(a=>a.headline&&a.url), type:'most-read' };
    }
  } catch(e) { console.warn('[QP] Guardian root API:', e.message); }

  // Strategy 2: scrape Guardian homepage for most-viewed section
  try {
    const html = await fetchViaProxies('https://www.theguardian.com/');
    const doc  = new DOMParser().parseFromString(html, 'text/html');
    // Guardian marks most-viewed with data-link-name containing "most-viewed"
    const sel = [
      '[data-link-name*="most-viewed"]',
      '[data-link-name*="most viewed"]',
      '.most-viewed', '.most-popular', '#most-viewed',
    ].join(',');
    const section = doc.querySelector(sel);
    if (section) {
      const arts = extractLinksFromContainer(section, { domain:'https://www.theguardian.com', articleTest: h => h.includes('theguardian.com/') });
      if (arts.length >= 2) {
        console.log('[QP] Guardian: homepage HTML most-viewed →', arts.length);
        return { articles: arts.slice(0,3), type:'most-read' };
      }
    }
    // Broader: look for "Most viewed" text near links
    const arts2 = findMostReadInHTML(doc, { mrKeywords:['most viewed','most popular'], domain:'https://www.theguardian.com', articleTest: h => h.includes('theguardian.com/') });
    if (arts2.length >= 2) return { articles: arts2.slice(0,3), type:'most-read' };
  } catch(e) { console.warn('[QP] Guardian scrape:', e.message); }

  // Strategy 3: world section most-viewed
  try {
    const t = await doFetch(
      'https://content.guardianapis.com/world?api-key=test&show-most-viewed=true&show-fields=trailText,headline&page-size=5',
      12000
    );
    const d = JSON.parse(t);
    const mv = d.response?.mostViewed?.results;
    if (mv?.length) {
      return { articles: mv.slice(0,3).map(mapGuardianResult).filter(a=>a.headline&&a.url), type:'most-read' };
    }
  } catch(e) { console.warn('[QP] Guardian world API:', e.message); }

  // Strategy 4: newest as last resort
  const t = await doFetch(
    'https://content.guardianapis.com/search?api-key=test&show-fields=trailText,headline&order-by=newest&page-size=5',
    12000
  );
  const d   = JSON.parse(t);
  const its = (d.response?.results || []).slice(0,3);
  return { articles: its.map(mapGuardianResult).filter(a=>a.headline&&a.url), type:'front-page' };
}

// ═══════════════════════════════════════════════════════════════════════
// NRC  —  uses the dedicated SSR most-read fragment endpoint
// Research-confirmed structure: .photo-articles__item > a + .photo-articles__headline
// Also tries homepage SSR slider: section.block-most-read .nmt-item__link
// ═══════════════════════════════════════════════════════════════════════
async function fetchNRC(paper) {
  // Strategy 1: dedicated most-read fragment endpoint (SSR, no JS needed)
  try {
    const html = await fetchViaProxies('https://www.nrc.nl/data/fragments/most-read?_t=' + Date.now());
    const doc  = new DOMParser().parseFromString(html, 'text/html');

    // Try research-confirmed selector first
    let items = [...doc.querySelectorAll('.photo-articles__item')];
    // Broader fallback selectors if class names changed
    if (!items.length) items = [...doc.querySelectorAll('[class*="most-read"] li, [class*="mostread"] li, [class*="toplist"] li')];

    if (items.length >= 2) {
      const arts = items.slice(0, 3).map(item => {
        const a        = item.querySelector('a');
        const headline = (
          item.querySelector('.photo-articles__headline, [class*="headline"], h2, h3')?.textContent ||
          a?.textContent || ''
        ).replace(/\s+/g, ' ').trim();
        const rawHref  = a?.getAttribute('href') || '';
        const url      = rawHref.startsWith('http') ? rawHref : 'https://www.nrc.nl' + rawHref;
        return { headline, url, summary: '', time: '' };
      }).filter(a => a.headline && a.url && a.headline.length > 10);
      if (arts.length >= 2) {
        console.log('[QP] NRC: fragment endpoint →', arts.length, 'articles');
        return { articles: arts, type: 'most-read' };
      }
    }

    // Even broader: just grab all article links from the fragment response
    const allLinks = extractLinksFromContainer(doc.body, {
      domain: 'https://www.nrc.nl',
      articleTest: h => h.includes('nrc.nl/nieuws/') || h.includes('nrc.nl/a/') || (h.startsWith('/') && !h.includes('/auteur/') && !h.includes('/sectie/')),
    });
    if (allLinks.length >= 2) {
      console.log('[QP] NRC: fragment (broad) →', allLinks.length);
      return { articles: allLinks.slice(0, 3), type: 'most-read' };
    }
  } catch(e) { console.warn('[QP] NRC fragment:', e.message); }

  // Strategy 2: homepage SSR — look for most-read slider / block
  try {
    const html  = await fetchViaProxies('https://www.nrc.nl/?_t=' + Date.now());
    const doc   = new DOMParser().parseFromString(html, 'text/html');

    // Try several selector patterns
    const candidates = [
      ...doc.querySelectorAll('section.block-most-read .nmt-item__link'),
      ...doc.querySelectorAll('[data-news-slider="most-read"] a'),
      ...doc.querySelectorAll('[class*="most-read"] a[href], [class*="mostread"] a[href]'),
    ];
    const seen = new Set();
    const arts = [];
    for (const a of candidates) {
      const headline = (a.querySelector('.nmt-item__headline, h2, h3, h4') || a)
        .textContent.replace(/\s+/g, ' ').trim();
      const rawHref = a.getAttribute('href') || '';
      const url = rawHref.startsWith('http') ? rawHref : 'https://www.nrc.nl' + rawHref;
      if (!headline || headline.length < 15 || seen.has(url)) continue;
      seen.add(url);
      arts.push({ headline, url, summary: '', time: '' });
      if (arts.length >= 3) break;
    }
    if (arts.length >= 2) {
      console.log('[QP] NRC: homepage most-read →', arts.length);
      return { articles: arts, type: 'most-read' };
    }
  } catch(e) { console.warn('[QP] NRC homepage:', e.message); }

  // Strategy 3: RSS fallback
  console.warn('[QP] NRC: falling back to RSS');
  const rssText = await fetchViaProxies(paper.rss + '?_t=' + Date.now());
  const items   = parseRSSXML(rssText);
  return { articles: items.slice(0, 3), type: 'front-page' };
}

// ═══════════════════════════════════════════════════════════════════════
// VOLKSKRANT  —  uses /best-gelezen/ SSR page (DPG Media CMS, not Next.js)
// Research-confirmed selectors:
//   Page:     article[data-list="popular"] a.teaser__link  (aria-label = full title)
//   Homepage: li[data-list="list best gelezen"] a.teaser__link
// Cookie wall bypassed because proxy sends non-browser UA
// ═══════════════════════════════════════════════════════════════════════
async function fetchVolkskrant(paper) {
  // Strategy 1: dedicated /best-gelezen/ page (SSR, ranked list of 50 articles)
  // Cookie wall is UA-based on DPG Media; CORS proxies bypass it (non-browser UA)
  try {
    const html = await fetchViaProxies('https://www.volkskrant.nl/best-gelezen/?_t=' + Date.now());
    const doc  = new DOMParser().parseFromString(html, 'text/html');

    // Research-confirmed selector
    let arts = parsVKArticles(doc, 'article[data-list="popular"]', paper.domain);
    // Broader fallback if selector changed
    if (arts.length < 2) arts = parsVKArticles(doc, 'article', paper.domain);
    if (arts.length >= 2) {
      console.log('[QP] VK: /best-gelezen/ →', arts.length, 'articles');
      return { articles: arts.slice(0, 3), type: 'most-read' };
    }
    console.warn('[QP] VK: /best-gelezen/ returned HTML but no articles — possible cookie wall');
    console.warn('[QP] VK page excerpt:', html.slice(0, 400));
  } catch(e) { console.warn('[QP] VK /best-gelezen/:', e.message); }

  // Strategy 2: homepage widget
  try {
    const html = await fetchViaProxies('https://www.volkskrant.nl/?_t=' + Date.now());
    const doc  = new DOMParser().parseFromString(html, 'text/html');

    // Try both confirmed selector and broader patterns
    let arts = parsVKArticles(doc, 'li[data-list="list best gelezen"]', paper.domain);
    if (arts.length < 2) arts = parsVKArticles(doc, '[data-list*="best gelezen"] li, [data-list*="best gelezen"] article', paper.domain);
    if (arts.length >= 2) {
      console.log('[QP] VK: homepage widget →', arts.length, 'articles');
      return { articles: arts.slice(0, 3), type: 'most-read' };
    }
  } catch(e) { console.warn('[QP] VK homepage:', e.message); }

  // Strategy 3: Google News RSS for VK (always current articles)
  try {
    const gnUrl = 'https://news.google.com/rss/search?q=site:volkskrant.nl&hl=nl&gl=NL&ceid=NL:nl';
    const t     = await fetchViaProxies(gnUrl + '&_t=' + Date.now());
    const it    = parseRSSXML(t);
    if (it.length) {
      console.log('[QP] VK: Google News RSS →', it.length);
      return { articles: it.slice(0, 3), type: 'front-page' };
    }
  } catch(e) { console.warn('[QP] VK Google News:', e.message); }

  // Strategy 4: VK's own RSS feed
  console.warn('[QP] VK: falling back to VK RSS');
  const rssText = await fetchViaProxies(paper.rss + '?_t=' + Date.now());
  const items   = parseRSSXML(rssText);
  return { articles: items.slice(0, 3), type: 'front-page' };
}

// Helper: extract VK articles from either page structure
function parsVKArticles(doc, containerSelector, domain) {
  const containers = [...doc.querySelectorAll(containerSelector)];
  const arts = [];
  const seen = new Set();

  for (const el of containers) {
    const a = el.querySelector('a.teaser__link') || el.querySelector('a[href]');
    if (!a) continue;

    // aria-label has the full untruncated headline; fall back to h3 text
    const headline = (
      a.getAttribute('aria-label') ||
      el.querySelector('h3[data-teaser-title], .teaser-list-item__title, [data-teaser-title]')?.textContent ||
      el.querySelector('h3,h4,h5')?.textContent ||
      ''
    ).replace(/\s+/g, ' ').trim();

    const rawHref = a.getAttribute('href') || '';
    const url     = rawHref.startsWith('http') ? rawHref : domain + rawHref;

    if (!headline || headline.length < 10) continue;
    if (!url || seen.has(url)) continue;
    // Skip /best-gelezen/ page itself, author pages, tag pages
    if (url.includes('/best-gelezen') || url.includes('/auteur/') || url.includes('/tag/')) continue;

    seen.add(url);
    arts.push({ headline, url, summary: '', time: '' });
    if (arts.length >= 5) break;
  }
  return arts;
}

// ═══════════════════════════════════════════════════════════════════════
// NEXT.JS  __NEXT_DATA__  parser
// ═══════════════════════════════════════════════════════════════════════
function searchNextData(obj, keywords, domain, depth = 0) {
  if (depth > 12 || !obj || typeof obj !== 'object') return null;

  if (Array.isArray(obj)) {
    for (const item of obj) {
      const r = searchNextData(item, keywords, domain, depth + 1);
      if (r) return r;
    }
    return null;
  }

  const label = String(
    obj.name || obj.label || obj.title || obj.heading ||
    obj.id   || obj.type  || obj.slug  || obj.sectionId || ''
  ).toLowerCase();

  if (keywords.some(k => label.includes(k))) {
    for (const val of Object.values(obj)) {
      if (!Array.isArray(val) || !val.length) continue;
      const arts = extractArticlesFromArray(val, domain);
      if (arts.length >= 2) {
        console.log('[QP] __NEXT_DATA__ hit:', label, '→', arts.length);
        return arts;
      }
    }
  }
  for (const val of Object.values(obj)) {
    const r = searchNextData(val, keywords, domain, depth + 1);
    if (r) return r;
  }
  return null;
}

function extractArticlesFromArray(arr, domain = '') {
  const arts = [];
  for (const item of arr) {
    if (!item || typeof item !== 'object') continue;
    let url = item.url || item.href || item.link || item.canonicalUrl ||
              item.webUrl || item.articleUrl || item.path || '';
    // Make relative URLs absolute
    if (url && !url.startsWith('http') && url.startsWith('/') && domain)
      url = domain + url;
    const headline = String(item.headline || item.title || item.heading || item.kicker || item.name || '').trim();
    const summary  = String(item.intro || item.summary || item.description || item.teaser || item.abstract || item.standfirst || '').slice(0, 240);
    const time     = String(item.publishedDate || item.date || item.pubDate || item.published || item.publicationDate || '');
    if (url && headline && url.startsWith('http'))
      arts.push({ headline, url, summary, time: relTime(time) });
  }
  return arts;
}

// ═══════════════════════════════════════════════════════════════════════
// GENERIC HTML MOST-READ FINDER
// ═══════════════════════════════════════════════════════════════════════
function findMostReadInHTML(doc, paper) {
  const keywords = paper.mrKeywords || [];
  if (!keywords.length) return [];

  const candidates = [...doc.querySelectorAll('h1,h2,h3,h4,h5,span,li,p,div,a')].filter(el => {
    const t = el.textContent.toLowerCase().trim();
    return t.length < 80 && keywords.some(k => t === k || t.startsWith(k + ' ') || t.endsWith(' ' + k));
  });

  for (const el of candidates) {
    let container = el;
    for (let i = 0; i < 8; i++) {
      container = container.parentElement;
      if (!container) break;
      const arts = extractLinksFromContainer(container, paper);
      if (arts.length >= 2) {
        console.log('[QP] HTML most-read near:', el.textContent.trim().slice(0,40), '→', arts.length);
        return arts;
      }
    }
  }
  return [];
}

function extractLinksFromContainer(container, paper) {
  const domain = paper.domain || paper.home || '';
  const test   = paper.articleTest || (() => true);
  const seen   = new Set();
  const arts   = [];

  for (const a of container.querySelectorAll('a[href]')) {
    const rawHref = a.getAttribute('href') || '';
    const text    = a.textContent.replace(/\s+/g, ' ').trim();
    if (!rawHref || text.length < 15) continue;

    const url = rawHref.startsWith('http') ? rawHref : domain + rawHref;
    if (!test(url) && !test(rawHref)) continue;
    if (/^(home|menu|login|subscribe|inloggen|abonneren|newsletter|meer|more)$/i.test(text)) continue;
    if (seen.has(url)) continue;
    seen.add(url);
    arts.push({ headline: text, url, summary: '', time: '' });
    if (arts.length >= 6) break;
  }
  return arts;
}

// ═══════════════════════════════════════════════════════════════════════
// HTML SCRAPE STRATEGY (FT)
// ═══════════════════════════════════════════════════════════════════════
async function fetchHtmlScrape(paper) {
  const html = await fetchViaProxies(paper.scrapeUrl || paper.home);
  const doc  = new DOMParser().parseFromString(html, 'text/html');
  const test = paper.articleTest;
  const seen = new Set();
  const arts = [];

  for (const a of doc.querySelectorAll('a[href]')) {
    const href = a.getAttribute('href') || '';
    const text = a.textContent.replace(/\s+/g, ' ').trim();
    if (!href || text.length < 20) continue;
    const url = href.startsWith('http') ? href : 'https://www.ft.com' + href;
    if (!test(url) && !test(href)) continue;
    if (seen.has(url)) continue;
    seen.add(url);
    arts.push({ headline: text, url, summary: '', time: '' });
    if (arts.length === 3) break;
  }
  if (!arts.length) throw new Error('No articles found in HTML');
  return { articles: arts, type: 'front-page' };
}

// ═══════════════════════════════════════════════════════════════════════
// HTML-MOST-READ STRATEGY (Le Monde, FAZ)
// ═══════════════════════════════════════════════════════════════════════
async function fetchHtmlMostRead(paper) {
  const html = await fetchViaProxies(paper.scrapeUrl);
  const doc  = new DOMParser().parseFromString(html, 'text/html');
  const arts = findMostReadInHTML(doc, paper);
  if (arts.length >= 2) return { articles: arts.slice(0,3), type:'most-read' };

  if (paper.rss) {
    console.warn('[QP]', paper.name, '— falling back to RSS');
    const t  = await fetchViaProxies(paper.rss);
    const it = parseRSSXML(t);
    return { articles: it.slice(0,3), type:'front-page' };
  }
  throw new Error('No most-read section and no RSS fallback');
}

// ═══════════════════════════════════════════════════════════════════════
// NEXT.JS STRATEGY (NRC)
// ═══════════════════════════════════════════════════════════════════════
async function fetchNextJsSite(paper) {
  const html = await fetchViaProxies(paper.scrapeUrl);
  const doc  = new DOMParser().parseFromString(html, 'text/html');

  const ndEl = doc.querySelector('#__NEXT_DATA__');
  if (ndEl) {
    try {
      const nd   = JSON.parse(ndEl.textContent);
      const arts = searchNextData(nd, paper.mrKeywords, paper.domain);
      if (arts?.length >= 2) return { articles: arts.slice(0,3), type:'most-read' };
    } catch(e) { console.warn('[QP] __NEXT_DATA__:', e.message); }
  }

  const arts = findMostReadInHTML(doc, paper);
  if (arts.length >= 2) return { articles: arts.slice(0,3), type:'most-read' };

  if (paper.rss) {
    const t  = await fetchViaProxies(paper.rss);
    const it = parseRSSXML(t);
    return { articles: it.slice(0,3), type:'front-page' };
  }
  throw new Error('No data found');
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN DISPATCHER
// ═══════════════════════════════════════════════════════════════════════
async function fetchPaper(paper) {
  let result;
  switch (paper.type) {
    case 'guardian':     result = await fetchGuardian();           break;
    case 'nrc':          result = await fetchNRC(paper);           break;
    case 'volkskrant':   result = await fetchVolkskrant(paper);    break;
    case 'html-most-read': result = await fetchHtmlMostRead(paper);break;
    case 'html-scrape':  result = await fetchHtmlScrape(paper);    break;
    case 'rss': {
      const urls = paper.rssUrls || (paper.rss ? [paper.rss] : []);
      if (!urls.length) throw new Error('No RSS URL configured');
      const STALE_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
      let lastErr;
      for (const rssUrl of urls) {
        try {
          const sep = rssUrl.includes('?') ? '&' : '?';
          const t   = await fetchViaProxies(rssUrl + sep + '_t=' + Date.now());
          const it  = parseRSSXML(t);
          if (!it.length) { lastErr = new Error('RSS returned 0 articles'); continue; }

          // Freshness check: skip feed if ALL articles are older than 7 days
          const hasFresh = it.some(a => {
            if (!a.rawDate) return true; // no date info → assume fresh
            try {
              const age = Date.now() - new Date(a.rawDate).getTime();
              return !isNaN(age) && age < STALE_MS;
            } catch { return true; }
          });
          if (!hasFresh) {
            console.warn('[QP]', paper.name, 'RSS stale (all articles >7d), trying next:', rssUrl.slice(0, 60));
            lastErr = new Error('RSS feed is stale');
            continue;
          }

          console.log('[QP]', paper.name, 'RSS OK:', rssUrl.split('/').slice(-2).join('/'));
          result = { articles: it.slice(0, 3), type: 'front-page' };
          break;
        } catch(e) {
          lastErr = e;
          console.warn('[QP]', paper.name, 'RSS failed:', rssUrl.slice(0, 70), '—', e.message);
        }
      }
      if (!result) throw lastErr || new Error('All RSS feeds failed');
      break;
    }
    default: throw new Error('Unknown type: ' + paper.type);
  }

  // Translate EU/FR and EU/DE headlines + summaries → English
  if (paper.lang && paper.lang !== 'en' && result.articles.length) {
    console.log('[QP]', paper.name, '— translating', result.articles.length, 'articles from', paper.lang);
    result.articles = await translateArticles(result.articles, paper.lang);
  }

  return result;
}

// ═══════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════
function stripHtml(html) {
  if (!html) return '';
  const d = document.createElement('div');
  d.innerHTML = html;
  return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
}
function relTime(str) {
  if (!str) return '';
  try {
    const mins = Math.round((Date.now() - new Date(str)) / 60000);
    if (isNaN(mins) || mins < 0) return '';
    if (mins < 1)    return 'zojuist';
    if (mins < 60)   return `${mins}m geleden`;
    if (mins < 1440) return `${Math.round(mins/60)}u geleden`;
    return new Date(str).toLocaleDateString('nl-NL', { day:'numeric', month:'short' });
  } catch { return ''; }
}
const esc = s => (!s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

function setStatus(msg, cls='') { const el=document.getElementById('status'); el.textContent=msg; el.className=cls; }
function setProg(pct) { document.getElementById('prog').style.width = pct + '%'; }

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
const RANKS = ['① Top', '② Twee', '③ Drie', '④ Vier', '⑤ Vijf'];

function skeletonHTML(p) {
  return `
    <div class="card-head">
      <div class="card-head-left">
        <div class="paper-name">${esc(p.name)}</div>
        <div class="source-label">Laden…</div>
      </div>
      <div class="badge ${p.region}">${p.region.toUpperCase()}</div>
    </div>
    <div class="skel-wrap">
      <div class="sk" style="height:14px;width:90%"></div>
      <div class="sk" style="height:14px;width:68%"></div>
      <div class="sk" style="height:9px;width:100%;margin-top:5px"></div>
      <div class="sk" style="height:9px;width:82%"></div>
      <div class="sk" style="height:8px;width:30%"></div>
      <div style="border-top:1px solid var(--paper-dark);margin:14px 0"></div>
      <div class="sk" style="height:14px;width:80%"></div>
      <div class="sk" style="height:9px;width:100%;margin-top:5px"></div>
      <div class="sk" style="height:9px;width:72%"></div>
      <div class="sk" style="height:8px;width:26%"></div>
      <div style="border-top:1px solid var(--paper-dark);margin:14px 0"></div>
      <div class="sk" style="height:14px;width:85%"></div>
      <div class="sk" style="height:9px;width:95%"></div>
      <div class="sk" style="height:8px;width:24%"></div>
    </div>`;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  PAPERS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `c-${p.id}`;
    card.dataset.region = p.region;
    card.innerHTML = skeletonHTML(p);
    grid.appendChild(card);
  });
}

function renderCard(paper, articles, dataType) {
  const card = document.getElementById(`c-${paper.id}`);
  if (!card) return;
  const isMR   = dataType === 'most-read';
  // Only show the special sourceLabel (e.g. "Meest gelezen") when we actually got most-read data
  const srcTxt = isMR ? (paper.sourceLabel || 'Meest gelezen') : 'Voorpagina';
  const srcCls = isMR ? 'most-read' : 'front-page';

  let html = `
    <div class="card-head">
      <div class="card-head-left">
        <div class="paper-name">${esc(paper.name)}</div>
        <div class="source-label ${srcCls}">${srcTxt}</div>
      </div>
      <div class="badge ${paper.region}">${paper.region.toUpperCase()}</div>
    </div>
    <div class="articles">`;

  articles.forEach((a, i) => {
    const trail  = a.summary && a.summary.length >= 240 ? '…' : '';
    const sumHtm = (a.summary && a.summary.trim() !== a.headline.trim())
      ? `<div class="art-sum">${esc(a.summary)}${trail}</div>` : '';
    const transNote = a.translated
      ? `<span class="translated-note">vertaald</span>` : '';
    html += `
      <div class="art">
        <div class="art-rank">${RANKS[i] || `#${i+1}`}</div>
        <a class="art-hl" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">${esc(a.headline)}</a>
        ${sumHtm}
        <div class="art-meta">
          ${a.time ? `<span>${esc(a.time)}</span>` : ''}
          ${transNote}
          <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">Lees →</a>
        </div>
      </div>`;
  });
  html += `</div>`;
  card.innerHTML = html;
}

function renderError(paper, reason) {
  const card = document.getElementById(`c-${paper.id}`);
  if (!card) return;
  card.innerHTML = `
    <div class="card-head">
      <div class="card-head-left">
        <div class="paper-name">${esc(paper.name)}</div>
        <div class="source-label">Niet geladen</div>
      </div>
      <div class="badge ${paper.region}">${paper.region.toUpperCase()}</div>
    </div>
    <div class="card-err">
      Feed tijdelijk niet beschikbaar.<br>
      <a href="${esc(paper.home)}" target="_blank" rel="noopener noreferrer">Open ${esc(paper.name)} →</a>
      <em>${esc(reason.slice(0, 160))}</em>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// LOAD ALL
// ═══════════════════════════════════════════════════════════════════════
async function loadAll() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  buildGrid();
  setProg(3);
  setStatus('Headlines laden…', 'loading');

  let done = 0, errs = 0;
  const n = PAPERS.length;

  await Promise.all(PAPERS.map(async paper => {
    try {
      const { articles, type } = await fetchPaper(paper);
      renderCard(paper, articles, type);
    } catch(e) {
      console.error('[QP]', paper.name, 'FAILED:', e.message);
      renderError(paper, e.message);
      errs++;
    }
    done++;
    setProg(Math.round(done / n * 100));
  }));

  setProg(100);
  const ts = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('updated').textContent = `Bijgewerkt: ${ts}`;

  if (errs === 0)      setStatus(`Alle ${n} kranten geladen.`, 'done');
  else if (errs < n)   setStatus(`${n-errs} van ${n} geladen — ${errs} niet beschikbaar.`, 'done');
  else                 setStatus('Alle feeds mislukt. Controleer je internetverbinding.', 'error');

  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════════════════
// FILTER + INIT
// ═══════════════════════════════════════════════════════════════════════
function applyFilter(region, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', region !== 'all' && c.dataset.region !== region);
  });
}

document.getElementById('js-date').textContent =
  new Date().toLocaleDateString('nl-NL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

document.addEventListener('DOMContentLoaded', loadAll);
